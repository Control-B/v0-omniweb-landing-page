name: seahorse-app
region: nyc

ingress:
  rules:
    - component:
        name: v0-omniweb-landing-page
      match:
        path:
          prefix: /


services:

  # ── Frontend / main Next.js app (root of repo) ────────────────────────────
  - name: v0-omniweb-landing-page
    source_dir: /
    github:
      repo: Control-B/v0-omniweb-landing-page
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    http_port: 8080
    run_command: pnpm start
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      http_path: /
    envs:
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${NEXT_PUBLIC_SUPABASE_URL}"
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${SUPABASE_SERVICE_ROLE_KEY}"
      - key: SUPABASE_DB_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${SUPABASE_DB_URL}"
      - key: SUPABASE_PGVECTOR_TABLE
        scope: RUN_AND_BUILD_TIME
        value: "${SUPABASE_PGVECTOR_TABLE}"
      - key: SUPABASE_PGVECTOR_MATCH_FUNCTION
        scope: RUN_AND_BUILD_TIME
        value: "${SUPABASE_PGVECTOR_MATCH_FUNCTION}"
      - key: DEEPGRAM_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${DEEPGRAM_API_KEY}"
      - key: DEEPGRAM_TTS_VOICE
        scope: RUN_AND_BUILD_TIME
        value: "${DEEPGRAM_TTS_VOICE}"
      - key: DIGITALOCEAN_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${DIGITALOCEAN_API_KEY}"
      - key: DIGITALOCEAN_AGENT_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${DIGITALOCEAN_AGENT_ID}"
      - key: DIGITALOCEAN_GENAI_ENDPOINT
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${DIGITALOCEAN_GENAI_ENDPOINT}"
      - key: OMNIWEB_LLM_MODEL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: "${OMNIWEB_LLM_MODEL}"
      - key: FASTAPI_ASSISTANT_URL
        scope: RUN_AND_BUILD_TIME
        value: "http://ai:8000"

  # ── AI service (Multi-tenant FastAPI / Python) ────────────────────────
  - name: ai
    dockerfile_path: ./ai/Dockerfile
    source_dir: ./ai
    github:
      repo: Control-B/v0-omniweb-landing-page
      branch: main
      deploy_on_push: true
    internal_ports:
      - 8000
    instance_size_slug: apps-s-1vcpu-1gb
    instance_count: 1
    health_check:
      http_path: /health
      port: 8000
    envs:
      # Database Configuration
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: "${SUPABASE_DB_URL}"
      - key: SUPABASE_URL
        scope: RUN_TIME
        value: "${NEXT_PUBLIC_SUPABASE_URL}"
      - key: SUPABASE_KEY
        scope: RUN_TIME
        value: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - key: SUPABASE_SERVICE_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${SUPABASE_SERVICE_ROLE_KEY}"
      # AI Services
      - key: OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${DIGITALOCEAN_API_KEY}"
      - key: DEEPGRAM_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${DEEPGRAM_API_KEY}"
      - key: LIVEKIT_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${LIVEKIT_API_KEY}"
      - key: LIVEKIT_API_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "${LIVEKIT_API_SECRET}"
      # DigitalOcean AI Integration (Legacy Compatibility)
      - key: DIGITALOCEAN_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${DIGITALOCEAN_API_KEY}"
      - key: DIGITALOCEAN_AGENT_ID
        scope: RUN_TIME
        type: SECRET
        value: "${DIGITALOCEAN_AGENT_ID}"
      - key: DIGITALOCEAN_GENAI_ENDPOINT
        scope: RUN_TIME
        type: SECRET
        value: "${DIGITALOCEAN_GENAI_ENDPOINT}"
      - key: DIGITALOCEAN_MODEL
        scope: RUN_TIME
        type: SECRET
        value: "${OMNIWEB_LLM_MODEL}"
      - key: OMNIWEB_LLM_MODEL
        scope: RUN_TIME
        type: SECRET
        value: "${OMNIWEB_LLM_MODEL}"
      # Legacy Supabase Variables
      - key: NEXT_PUBLIC_SUPABASE_URL
        scope: RUN_TIME
        value: "${NEXT_PUBLIC_SUPABASE_URL}"
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        scope: RUN_TIME
        value: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${SUPABASE_SERVICE_ROLE_KEY}"
      - key: SUPABASE_DB_URL
        scope: RUN_TIME
        type: SECRET
        value: "${SUPABASE_DB_URL}"
      - key: SUPABASE_PGVECTOR_TABLE
        scope: RUN_TIME
        value: "${SUPABASE_PGVECTOR_TABLE}"
      - key: SUPABASE_PGVECTOR_MATCH_FUNCTION
        scope: RUN_TIME
        value: "${SUPABASE_PGVECTOR_MATCH_FUNCTION}"
      # Security and Performance
      - key: JWT_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: "${JWT_SECRET_KEY}"
      - key: ENVIRONMENT
        scope: RUN_TIME
        value: "production"
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: "INFO"
